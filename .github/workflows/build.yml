name: Build and Verify

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore CybersecurityBot/CybersecurityBot.csproj

      - name: Build project
        run: dotnet build CybersecurityBot/CybersecurityBot.csproj --no-restore --configuration Release
